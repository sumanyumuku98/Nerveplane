    <line x1="128" y1="128" x2="198" y2="186"/>
    <line x1="128" y1="128" x2="210" y2="128"/>
  </g>

  <g fill="#1e293b" stroke="#3b82f6" stroke-width="4">
    <circle cx="64"  cy="68"  r="15"/>
    <circle cx="196" cy="72"  r="15"/>
    <circle cx="60"  cy="190" r="15"/>
    <circle cx="198" cy="186" r="15"/>
    <circle cx="210" cy="128" r="13"/>
