name: Docs

on:
  push:
    branches: [main]
    paths: ["docs/**", "assets/logo.svg", ".github/workflows/docs.yml", "package.json", "bun.lock"]
  pull_request:
    branches: [main]
    paths: ["docs/**", "assets/logo.svg", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to releases >7 days old (org dependency policy).
      - uses: actions/checkout@v6.0.2
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.2.18"
      - run: bun install --frozen-lockfile
      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0
        with:
          enablement: true
      - name: Build VitePress site
        run: bun run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: deploy to Pages
    # Build verifies on every PR; deploy only from main.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
