name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  npm:
    name: publish to npm
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.2.18"
      - run: bun install --frozen-lockfile
      - run: bun run build:dashboard
      - name: Publish (skipped if NPM_TOKEN is unset)
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --provenance --access public
      - name: Note when skipped
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN not set — skipping npm publish. Add the secret to enable."

  binaries:
    name: build & attach binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.2.18"
      - run: bun install --frozen-lockfile
      - name: Cross-compile binaries (macOS arm64/x64, Linux x64)
        run: bun run build:binaries
      - name: Attach to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          ASSETS="dist/nerveplane-darwin-arm64 dist/nerveplane-darwin-x64 dist/nerveplane-linux-x64 dist/nerveplane-linux-arm64 dist/nerveplane-windows-x64.exe"
          gh release view "$TAG" >/dev/null 2>&1 \
            && gh release upload "$TAG" $ASSETS --clobber \
            || gh release create "$TAG" $ASSETS --generate-notes --title "$TAG"

  homebrew:
    name: update homebrew tap
    needs: binaries
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Note when skipped
        if: ${{ env.TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap update."
      - name: Bump formula in sumanyumuku98/homebrew-nerveplane
        if: ${{ env.TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME}"; VER="${TAG#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          sha() { gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p "$1" -O "$1" --clobber; sha256sum "$1" | cut -d' ' -f1; }
          DA=$(sha nerveplane-darwin-arm64); DX=$(sha nerveplane-darwin-x64)
          LX=$(sha nerveplane-linux-x64); LA=$(sha nerveplane-linux-arm64)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/sumanyumuku98/homebrew-nerveplane.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/nerveplane.rb <<EOF
          class Nerveplane < Formula
            desc "Coordination plane for autonomous coding agents"
            homepage "https://github.com/sumanyumuku98/Nerveplane"
            version "${VER}"
            license "MIT"

            on_macos do
              on_arm { url "${base}/nerveplane-darwin-arm64"; sha256 "${DA}" }
              on_intel { url "${base}/nerveplane-darwin-x64"; sha256 "${DX}" }
            end
            on_linux do
              on_intel { url "${base}/nerveplane-linux-x64"; sha256 "${LX}" }
              on_arm { url "${base}/nerveplane-linux-arm64"; sha256 "${LA}" }
            end

            def install
              bin.install Dir["nerveplane-*"].first => "nerveplane"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/nerveplane --version")
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nerveplane.rb
          git commit -m "nerveplane ${VER}" && git push
